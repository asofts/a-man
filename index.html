<script>

/* =========================
   CUSTOM CURSOR
========================= */

const cursor = document.getElementById('cursor');
const ring = document.getElementById('cursorRing');

let mouseX = 0;
let mouseY = 0;
let ringX = 0;
let ringY = 0;

document.addEventListener('mousemove', (e) => {
  mouseX = e.clientX;
  mouseY = e.clientY;

  cursor.style.left = mouseX - 6 + "px";
  cursor.style.top = mouseY - 6 + "px";
});

function animateRing() {
  ringX += (mouseX - ringX - 20) * 0.15;
  ringY += (mouseY - ringY - 20) * 0.15;

  ring.style.left = ringX + "px";
  ring.style.top = ringY + "px";

  requestAnimationFrame(animateRing);
}

animateRing();

/* Hover effects */

document.querySelectorAll("button, a").forEach(el => {
  el.addEventListener("mouseenter", () => {
    cursor.style.transform = "scale(2.5)";
  });

  el.addEventListener("mouseleave", () => {
    cursor.style.transform = "scale(1)";
  });
});


/* =========================
   READING PROGRESS BAR
========================= */

window.addEventListener("scroll", () => {

  const totalHeight =
    document.body.scrollHeight - window.innerHeight;

  const progress =
    (window.scrollY / totalHeight) * 100;

  document.getElementById("progress").style.width =
    progress + "%";

});


/* =========================
   COUNTER ANIMATION
========================= */

function animateCounters() {

  document.querySelectorAll(".stat-num").forEach(el => {

    const target = el.dataset.count;

    if (target === "∞") {
      el.textContent = "∞";
      return;
    }

    let value = 0;
    const end = parseInt(target);

    function update() {

      value += Math.ceil((end - value) / 6);

      el.textContent = value;

      if (value < end) {
        requestAnimationFrame(update);
      } else {
        el.textContent = end;
      }

    }

    update();

  });

}

const counterObserver =
  new IntersectionObserver(entries => {

    if (entries[0].isIntersecting) {
      animateCounters();
      counterObserver.disconnect();
    }

  }, { threshold: 0.5 });

counterObserver.observe(
  document.querySelector(".counter-section")
);


/* =========================
   CARD REVEAL
========================= */

function toggleReveal(id, btn) {

  const el = document.getElementById(id);

  el.classList.toggle("visible");

  const open = el.classList.contains("visible");

  btn.innerHTML = open
    ? 'Close <span class="arrow">↑</span>'
    : 'Go deeper <span class="arrow">→</span>';

}


/* =========================
   CARD FILTER
========================= */

function filterCards(event, category) {

  document
    .querySelectorAll(".filter-btn")
    .forEach(b => b.classList.remove("active"));

  event.target.classList.add("active");

  document.querySelectorAll(".card").forEach(card => {

    if (category === "all" || card.dataset.cat === category) {
      card.classList.remove("hidden");
    } else {
      card.classList.add("hidden");
    }

  });

}


/* =========================
   CURIOSITY ENGINE
========================= */

let wonders = [];
let lastIndex = -1;


/* Load curiosities */

async function loadFacts() {

  try {

    const response = await fetch("facts.json");

    wonders = await response.json();

    dailyFact();

  } catch (err) {

    console.error("Facts failed to load", err);

    document.getElementById("machineFact")
      .textContent = "Curiosities failed to load.";

  }

}


/* Daily curiosity */

function dailyFact() {

  if (wonders.length === 0) return;

  const factEl = document.getElementById("machineFact");
  const catEl = document.getElementById("machineCat");

  const today = new Date().toDateString();

  let hash = 0;

  for (let i = 0; i < today.length; i++) {
    hash = today.charCodeAt(i) + ((hash << 5) - hash);
  }

  const index = Math.abs(hash) % wonders.length;

  factEl.textContent = wonders[index].text;
  catEl.textContent = "// " + wonders[index].category;

}


/* Random curiosity */

function newFact() {

  const factEl = document.getElementById("machineFact");
  const catEl = document.getElementById("machineCat");

  if (wonders.length === 0) {

    factEl.textContent = "Loading curiosities...";
    return;

  }

  let index;

  do {
    index = Math.floor(Math.random() * wonders.length);
  } while (index === lastIndex);

  lastIndex = index;

  const fact = wonders[index];

  factEl.textContent = fact.text;
  catEl.textContent = "// " + fact.category;

}


/* Start system */

loadFacts();

</script>
