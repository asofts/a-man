<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CURIOUS — A Daily Dose of Wonder</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Space+Mono&family=Cormorant+Garamond&display=swap" rel="stylesheet">

<style>

body{
background:#0a0a0f;
color:#f5f0e8;
font-family:'Space Mono',monospace;
margin:0;
cursor:none;
}

.cursor{
position:fixed;
width:12px;
height:12px;
background:#e8a030;
border-radius:50%;
pointer-events:none;
z-index:9999;
}

.cursor-ring{
position:fixed;
width:40px;
height:40px;
border:1px solid rgba(232,160,48,0.4);
border-radius:50%;
pointer-events:none;
z-index:9998;
}

.hero{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
text-align:center;
}

.hero h1{
font-size:6rem;
font-family:'DM Serif Display',serif;
}

.machine-section{
max-width:900px;
margin:auto;
padding:4rem 2rem;
}

.machine-box{
border:1px solid rgba(255,255,255,0.2);
padding:3rem;
background:rgba(255,255,255,0.02);
}

.machine-fact{
font-size:1.4rem;
font-family:'Cormorant Garamond',serif;
line-height:1.6;
margin-bottom:2rem;
}

.machine-btn{
border:1px solid #e8a030;
padding:12px 22px;
background:none;
color:#e8a030;
cursor:none;
}

</style>
</head>

<body>

<div class="cursor" id="cursor"></div>
<div class="cursor-ring" id="cursorRing"></div>

<section class="hero">
<h1>CURIOUS</h1>
<p>A daily cabinet of curiosities</p>
</section>

<div class="machine-section">

<div class="machine-box">

<div class="machine-fact" id="machineFact">
Loading curiosity...
</div>

<button class="machine-btn" onclick="newFact()">
Generate wonder →
</button>

</div>

</div>

<script>

/* =======================
CURSOR
======================= */

const cursor = document.getElementById("cursor")
const ring = document.getElementById("cursorRing")

let mouseX=0
let mouseY=0
let ringX=0
let ringY=0

document.addEventListener("mousemove",e=>{
mouseX=e.clientX
mouseY=e.clientY

cursor.style.left=(mouseX-6)+"px"
cursor.style.top=(mouseY-6)+"px"
})

function animateRing(){

ringX += (mouseX-ringX-20)*0.15
ringY += (mouseY-ringY-20)*0.15

ring.style.left = ringX+"px"
ring.style.top = ringY+"px"

requestAnimationFrame(animateRing)
}

animateRing()

document.querySelectorAll("button,a").forEach(el=>{
el.addEventListener("mouseenter",()=>{
cursor.style.transform="scale(2)"
})
el.addEventListener("mouseleave",()=>{
cursor.style.transform="scale(1)"
})
})

/* =======================
FACT SYSTEM
======================= */

let wonders=[]
let lastIndex=-1

async function loadFacts(){

const res = await fetch("facts.json")
wonders = await res.json()

dailyFact()

}

function dailyFact(){

if(wonders.length===0)return

const el=document.getElementById("machineFact")

const today=new Date().toDateString()

let hash=0

for(let i=0;i<today.length;i++){
hash = today.charCodeAt(i) + ((hash<<5)-hash)
}

const index=Math.abs(hash)%wonders.length

el.textContent = wonders[index].text

}

function newFact(){

if(wonders.length===0)return

let index

do{
index=Math.floor(Math.random()*wonders.length)
}
while(index===lastIndex)

lastIndex=index

document.getElementById("machineFact").textContent=wonders[index].text

}

loadFacts()

</script>

</body>
</html>
